{% extends 'base.html' %}
{% block title %}Reset Password | BloomCare Hospital{% endblock %}

{% block content %}
<div class="row py-5">
    <div class="col-md-5 mx-auto">
        <div class="card card-hospital p-4 p-md-5">
            <div class="text-center mb-4">
                <span class="fs-2 brand-font"><i class="bi bi-heart-pulse-fill text-danger"></i> BloomCare</span>
                <h4 class="mt-2 brand-font">Reset Password</h4>
                <p class="text-muted small">Enter the 6-digit OTP sent to your Gmail</p>
            </div>
            
            <form method="post" action="{% url 'patient_reset_password' %}">
                {% csrf_token %}
                <input type="hidden" name="gmail" value="{{ gmail }}">
                
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Gmail Address</label>
                    <input type="email" value="{{ gmail }}" class="form-control" readonly>
                </div>
                
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Verification OTP</label>
                    <input type="text" name="otp" class="form-control text-center letter-spacing-lg" placeholder="Enter 6-digit OTP" max-length="6" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label small fw-semibold">New Password</label>
                    <input type="password" name="new_password" class="form-control" placeholder="New Password" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>
                </div>
                
                <button type="submit" class="btn btn-pink w-100 py-3 mb-3"><i class="bi bi-shield-check"></i> Reset Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
