{% extends 'base.html' %}
{% block title %}Patient Sign In | BloomCare Hospital{% endblock %}

{% block content %}
<div class="row py-5">
    <div class="col-md-5 mx-auto">
        <div class="card card-hospital p-4 p-md-5">
            <div class="text-center mb-4">
                <span class="fs-2 brand-font"><i class="bi bi-heart-pulse-fill text-danger"></i> BloomCare</span>
                <h4 class="mt-2 brand-font">Patient Login</h4>
                <p class="text-muted small">Access your patient clinical dashboards and e-prescriptions</p>
            </div>
            
            <form method="post" action="{% url 'patient_login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Full Name</label>
                    <input type="text" name="full_name" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn btn-pink w-100 py-3 mb-3"><i class="bi bi-box-arrow-in-right"></i> Login</button>
            </form>
            
            <div class="text-center mt-3 border-top pt-3" style="border-top-color: var(--border-color) !important;">
                <p class="small text-muted mb-0">Don't have an account? <a href="{% url 'patient_register' %}" class="fw-semibold text-rose" style="color: var(--primary-pink-dark);">Register Here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
