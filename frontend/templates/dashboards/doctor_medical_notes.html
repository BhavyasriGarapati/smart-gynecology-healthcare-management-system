{% extends 'dashboards/doctor_base.html' %}

{% block doctor_content %}
<h3 class="brand-font mb-3">Record Medical Notes</h3>
<h5 class="text-muted small">Patient: {{ appointment.patient_name }} ({{ appointment.age }}) • Symptom: {{ appointment.selected_symptom }}</h5>

<form method="post">
    {% csrf_token %}
    <div class="mb-4 mt-3">
        <label class="form-label small fw-semibold">Clinical Diagnostics & Observation Notes</label>
        <textarea name="doctor_notes" class="form-control" rows="6" required>{{ appointment.doctor_notes|default:"" }}</textarea>
    </div>
    
    <button type="submit" class="btn btn-pink"><i class="bi bi-save-fill"></i> Save Medical Notes</button>
    <a href="{% url 'doctor_dashboard' %}" class="btn btn-outline-pink">Cancel</a>
</form>
{% endblock %}
