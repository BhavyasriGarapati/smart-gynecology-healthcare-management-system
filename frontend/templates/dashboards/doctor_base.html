{% extends 'base.html' %}

{% block content %}
<div class="row">
    <!-- Left Column: Doctor Sidebar Navigation -->
    <div class="col-md-3 mb-4">
        <div class="sidebar-wellness" style="background-color: var(--bg-pink-light); border-color: var(--border-color);">
            <h5 class="brand-font mb-4 text-center"><i class="bi bi-heart-pulse-fill"></i> Specialist Portal</h5>
            
            <a href="{% url 'doctor_dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'doctor_dashboard' %}active{% endif %}">
                <i class="bi bi-house-door-fill me-2"></i> Dashboard
            </a>
            <a href="{% url 'doctor_patient_records' %}" class="sidebar-link {% if request.resolver_match.url_name == 'doctor_patient_records' %}active{% endif %}">
                <i class="bi bi-journal-medical me-2"></i> Patient Records
            </a>
            
            <hr class="my-3" style="border-color: var(--border-color);">
            
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-pink w-100"><i class="bi bi-box-arrow-right"></i> Logout</button>
            </form>
        </div>
    </div>
    
    <!-- Right Column: Workspace Details -->
    <div class="col-md-9">
        <div class="card card-hospital p-4">
            {% block doctor_content %}
            {% endblock %}
        </div>
    </div>
</div>
{% endblock %}
