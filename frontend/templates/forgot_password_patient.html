{% extends 'base.html' %}
{% block title %}Forgot Password | BloomCare Hospital{% endblock %}

{% block content %}
<div class="row py-5">
    <div class="col-md-5 mx-auto">
        <div class="card card-hospital p-4 p-md-5">
            <div class="text-center mb-4">
                <span class="fs-2 brand-font"><i class="bi bi-heart-pulse-fill text-danger"></i> BloomCare</span>
                <h4 class="mt-2 brand-font">Forgot Password</h4>
                <p class="text-muted small">Enter your registered Gmail address to verify identity</p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Gmail Address</label>
                    <input type="email" name="gmail" class="form-control" placeholder="Enter your registered Gmail" required>
                </div>
                
                <button type="submit" class="btn btn-pink w-100 py-3 mb-3"><i class="bi bi-send-fill"></i> Send OTP Verification</button>
            </form>
            
            <div class="text-center mt-3 border-top pt-3" style="border-top-color: var(--border-color) !important;">
                <p class="small text-muted mb-0">Remembered password? <a href="{% url 'patient_login' %}" class="fw-semibold text-rose" style="color: var(--primary-rose);">Back to Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
