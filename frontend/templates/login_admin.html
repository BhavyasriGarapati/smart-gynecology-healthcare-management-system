{% extends 'base.html' %}
{% block title %}Admin Sign In | BloomCare Hospital{% endblock %}

{% block content %}
<div class="row py-5">
    <div class="col-md-5 mx-auto">
        <div class="card card-hospital p-4 p-md-5" style="border-top: 5px solid var(--text-dark);">
            <div class="text-center mb-4">
                <span class="fs-2 brand-font"><i class="bi bi-heart-pulse-fill text-danger"></i> BloomCare</span>
                <h4 class="mt-2 brand-font">Admin Portal Login</h4>
                <p class="text-muted small">Access full directory records of patients and specialists</p>
            </div>
            
            <form method="post" action="{% url 'admin_login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Admin Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter Admin Username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
                </div>
                
                <button type="submit" class="btn btn-pink w-100 py-3 mb-3" style="background-color: var(--text-dark); border-color: var(--text-dark);"><i class="bi bi-shield-lock-fill"></i> Login as Admin</button>
            </form>
            
            <div class="text-center mt-3 border-top pt-3" style="border-top-color: var(--border-color) !important;">
                <p class="small text-muted mb-0">Are you a patient? <a href="{% url 'patient_login' %}" class="fw-semibold text-rose" style="color: var(--primary-rose);">Access Patient Portal</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
